<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DualEngine V2.0 Dashboard</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #238636;
            padding: 40px;
            border-radius: 15px;
            background: #161b22;
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.3);
        }
        h1 { color: #238636; letter-spacing: 5px; }
        .status { color: #ffffff; margin-top: 20px; }
        .blink { animation: blinker 1.5s linear infinite; color: #f85149; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>DUALENGINE V2.0</h1>
        <p class="status">Sistem Durumu: <span style="color:#238636;">AKTIF</span></p>
        <p>NeuroCore Bağlantısı: <span style="color:#238636;">KURULDU</span></p>
        <p class="blink">DİKKAT: Quantum Compute Modülü Çalışıyor...</p>
        <hr style="border: 0.5px solid #30363d; margin: 20px 0;">
        <p style="font-size: 0.8rem; color: #8b949e;">T.D.E Entertainment - Italy State Loyalty Verified</p>
    </div>
</body>
</html>
