<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>DualEngine V2.0 | Download Center</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-green: #00ff9d;
            --dark-bg: #080a0f;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .download-card {
            background: #12161d;
            border: 2px solid #1f242c;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.4s;
            position: relative;
        }

        .download-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .version-tag {
            background: rgba(0, 255, 157, 0.1);
            color: var(--neon-green);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid var(--neon-green);
        }

        /* Havalı İndirme Butonu */
        .btn-download {
            display: inline-block;
            margin-top: 30px;
            padding: 20px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            background: var(--neon-blue);
            border: none;
            border-radius: 10px;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 0 20px var(--neon-blue);
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--neon-blue);
            background: #fff;
        }

        .file-info {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #6e7681;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <span class="version-tag">STABLE RELEASE</span>
        <h1>DualEngine V2.0</h1>
        <p>NeuroCore & Quantum Integrated Kernel</p>
        
        <a href="https://github.com/KULLANICI_ADIN/DualEngineV2/releases/latest" class="btn-download">
            DOWNLOAD V2.0.0
        </a>

        <div class="file-info">
            Platform: Windows 10/11 (x64) <br>
            Boyut: 4.2 MB | Format: .exe / .zip
        </div>
    </div>

</body>
</html>
